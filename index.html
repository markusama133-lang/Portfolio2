<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARK OSAMA | Visual Artist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --primary-neon: #00f2fe; 
            --font-main: 'Inter', sans-serif;
            --font-display: 'Oswald', sans-serif;
            --transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: #fff; font-family: var(--font-main); overflow-x: hidden; scroll-behavior: smooth; }

        /* --- Animations --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- Navigation --- */
        .pro-nav { 
            padding: 20px 5%; position: fixed; width: 100%; z-index: 1000; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: var(--font-display); font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: 2px; }
        .logo span { color: var(--primary-neon); }

        /* --- Hero Section --- */
        .pro-hero { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative; text-align: center;
        }
        .video-bg { position: absolute; inset: 0; z-index: -1; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 10%, #000 95%); }

        .glitch-text { font-family: var(--font-display); font-size: clamp(3rem, 12vw, 9rem); text-transform: uppercase; line-height: 0.9; }

        /* --- Filter Tabs --- */
        .filter-container { 
            display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; 
        }
        .filter-btn { 
            background: transparent; border: 1px solid #333; color: #888; padding: 10px 25px; 
            border-radius: 50px; cursor: pointer; font-family: var(--font-display); 
            letter-spacing: 1px; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;
        }
        .filter-btn.active, .filter-btn:hover { border-color: var(--primary-neon); color: #fff; background: rgba(0,242,254,0.1); }

        /* --- Grid System --- */
        .work-section { padding: 100px 5%; }
        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; grid-auto-flow: dense; 
        }
        .work-item { 
            position: relative; border-radius: 15px; overflow: hidden; 
            background: #0a0a0a; border: 1px solid #1a1a1a; transition: var(--transition);
            display: block; /* For filtering */
        }
        .work-item.hidden { display: none; }
        .work-item:hover { transform: translateY(-10px); border-color: var(--primary-neon); }
        
        .work-item.vertical { grid-row: span 2; }
        .video-container { position: relative; width: 100%; height: 100%; }
        .vertical .video-container { aspect-ratio: 9/16; }
        .horizontal .video-container { aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }

        .item-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to top, #000, transparent); pointer-events: none; opacity: 0; transition: 0.3s; }
        .work-item:hover .item-info { opacity: 1; }

        /* --- Sections --- */
        .about-section { padding: 100px 10%; background: #050505; }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
        .about-img { width: 100%; border-radius: 15px; filter: grayscale(1); border: 1px solid #222; }

        .contact-section { padding: 100px 5%; text-align: center; }
        .email-link { font-family: var(--font-display); font-size: clamp(2rem, 6vw, 4rem); color: #fff; text-decoration: none; transition: 0.3s; }
        .email-link:hover { color: var(--primary-neon); text-shadow: 0 0 20px var(--primary-neon); }

        /* --- Admin UI --- */
        #admin-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; background: rgba(15,15,15,0.98); backdrop-filter: blur(25px);
            border: 1px solid var(--primary-neon); border-radius: 20px; padding: 30px;
            z-index: 2000; display: none; box-shadow: 0 0 100px #000;
        }
        .admin-form input, .admin-form select {
            width: 100%; padding: 12px; margin-bottom: 12px; background: #000; 
            border: 1px solid #333; color: #fff; border-radius: 8px;
        }
        .admin-btn { width: 100%; padding: 14px; background: var(--primary-neon); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        .admin-trigger { position: fixed; bottom: 20px; left: 20px; font-size: 8px; color: #222; cursor: pointer; background:none; border:none; }

        @media (max-width: 768px) { .about-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="pro-nav">
        <div class="nav-content reveal">
            <a href="#" class="logo">[ MARK OSAMA <span>/</span> STUDIO ]</a>
        </div>
    </nav>

    <section class="pro-hero">
        <div class="video-bg">
            <video autoplay muted loop playsinline><source src="1.mp4" type="video/mp4"></video>
            <div class="overlay"></div>
        </div>
        <div class="reveal">
            <h1 class="glitch-text">MARK OSAMA</h1>
            <p style="letter-spacing: 10px; color: var(--primary-neon); font-size: 0.8rem;">VISUAL STORYTELLER</p>
        </div>
    </section>

    <section id="work" class="work-section">
        <div class="filter-container reveal">
            <button class="filter-btn active" onclick="filterWork('all')">All Works</button>
            <button class="filter-btn" onclick="filterWork('social')">Social Reels</button>
            <button class="filter-btn" onclick="filterWork('auto')">Auto</button>
            <button class="filter-btn" onclick="filterWork('story')">Storytelling</button>
            <button class="filter-btn" onclick="filterWork('3d')">3D</button>
            <button class="filter-btn" onclick="filterWork('motion')">Motion</button>
        </div>
        <div class="grid-container" id="grid"></div>
    </section>

    <section id="about" class="about-section">
        <div class="about-grid">
            <img src="erasebg-transformed.png" class="about-img reveal" alt="Mark">
            <div class="reveal">
                <h2 style="font-family: Oswald; font-size: 3rem; color: var(--primary-neon);">ABOUT</h2>
                <p style="color: #888; line-height: 1.8; margin: 20px 0;">Professional Video Editor specializing in high-end commercial content and cinematic storytelling. Turning visions into immersive digital experiences.</p>
                <div style="display: flex; gap: 20px;">
                    <a href="https://wa.me/201098119039" style="color: #fff;"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://www.instagram.com/mark_usama._" style="color: #fff;"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="contact-section reveal">
        <a href="mailto:markusama133@gmail.com" class="email-link">GET IN TOUCH</a>
    </section>

    <button class="admin-trigger" onclick="checkPass()">ADMIN</button>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3 style="font-family:Oswald;">GUI CONTROL</h3>
            <span onclick="toggleAdmin()" style="cursor:pointer">✕</span>
        </div>
        <div class="admin-form">
            <input type="text" id="v-id" placeholder="Vimeo ID">
            <input type="text" id="v-title" placeholder="Project Name">
            <select id="v-cat">
                <option value="social">Social Reels</option>
                <option value="auto">Auto</option>
                <option value="story">Storytelling</option>
                <option value="3d">3D</option>
                <option value="motion">Motion</option>
            </select>
            <select id="v-type">
                <option value="vertical">Vertical (9:16)</option>
                <option value="horizontal">Horizontal (16:9)</option>
            </select>
            <button class="admin-btn" onclick="addProject()">PUBLISH PROJECT</button>
        </div>
        <div id="admin-list" style="margin-top:20px; max-height:120px; overflow-y:auto; border-top:1px solid #333; padding-top:10px;"></div>
    </div>

    <script>
        let projects = JSON.parse(localStorage.getItem('mark_v3_data')) || [
            { id: "1175517526", title: "Dr. Reel", category: "social", type: "vertical" },
            { id: "1175485331", title: "Car Edit", category: "auto", type: "horizontal" }
        ];

        function render() {
            const grid = document.getElementById('grid');
            const adminList = document.getElementById('admin-list');
            grid.innerHTML = '';
            adminList.innerHTML = '';

            projects.forEach((p, index) => {
                grid.innerHTML += `
                    <div class="work-item ${p.type} ${p.category} reveal">
                        <div class="video-container">
                            <iframe src="https://player.vimeo.com/video/${p.id}?badge=0&title=0&byline=0&portrait=0" allow="autoplay; fullscreen" allowfullscreen></iframe>
                        </div>
                        <div class="item-info">
                            <p style="font-size:10px; color:var(--primary-neon)">${p.category.toUpperCase()}</p>
                            <h4 style="font-family:Oswald">${p.title}</h4>
                        </div>
                    </div>
                `;
                adminList.innerHTML += `
                    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
                        <span>${p.title} (${p.category})</span>
                        <span onclick="deleteProject(${index})" style="color:red; cursor:pointer">Delete</span>
                    </div>
                `;
            });
            setTimeout(reveal, 100);
        }

        function filterWork(cat) {
            const items = document.querySelectorAll('.work-item');
            const btns = document.querySelectorAll('.filter-btn');
            
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            items.forEach(item => {
                if(cat === 'all' || item.classList.contains(cat)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function checkPass() {
            if(prompt("Password:") === "mark 1234") toggleAdmin();
            else alert("Denied");
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function addProject() {
            const id = document.getElementById('v-id').value;
            const title = document.getElementById('v-title').value;
            const cat = document.getElementById('v-cat').value;
            const type = document.getElementById('v-type').value;
            if(id && title) {
                projects.unshift({id, title, category: cat, type});
                localStorage.setItem('mark_v3_data', JSON.stringify(projects));
                render();
            }
        }

        function deleteProject(index) {
            projects.splice(index, 1);
            localStorage.setItem('mark_v3_data', JSON.stringify(projects));
            render();
        }

        function reveal() {
            document.querySelectorAll('.reveal').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
        }

        window.addEventListener('scroll', reveal);
        window.onload = render;
    </script>
</body>
</html>
